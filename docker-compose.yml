services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ADAPTIVE_KNOWLEDGE_OPENAI_API_KEY: ${ADAPTIVE_KNOWLEDGE_OPENAI_API_KEY:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_MODEL: ${ADAPTIVE_KNOWLEDGE_OPENAI_MODEL:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_TIMEOUT_MS: ${ADAPTIVE_KNOWLEDGE_OPENAI_TIMEOUT_MS:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_PROMPT_VERSION: ${ADAPTIVE_KNOWLEDGE_OPENAI_PROMPT_VERSION:-}
      PIPELINE_ALLOWED_DOMAINS: ${PIPELINE_ALLOWED_DOMAINS:-}
      PIPELINE_FRESHNESS_WINDOW_DAYS: ${PIPELINE_FRESHNESS_WINDOW_DAYS:-}
      PIPELINE_BACKFILL_MAX_DAYS: ${PIPELINE_BACKFILL_MAX_DAYS:-}
      PIPELINE_MAX_RETRIES: ${PIPELINE_MAX_RETRIES:-}
      PIPELINE_REQUEST_TIMEOUT_MS: ${PIPELINE_REQUEST_TIMEOUT_MS:-}
      PIPELINE_MAX_QUERIES_PER_RUN: ${PIPELINE_MAX_QUERIES_PER_RUN:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - backend
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_HOST_PORT:-3002}:3000"
    volumes:
      - adaptive_knowledge_data:/app/.planning/knowledge/adaptive-coaching

  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    environment:
      NODE_ENV: production
      ADAPTIVE_KNOWLEDGE_OPENAI_API_KEY: ${ADAPTIVE_KNOWLEDGE_OPENAI_API_KEY:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_MODEL: ${ADAPTIVE_KNOWLEDGE_OPENAI_MODEL:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_TIMEOUT_MS: ${ADAPTIVE_KNOWLEDGE_OPENAI_TIMEOUT_MS:-}
      ADAPTIVE_KNOWLEDGE_OPENAI_PROMPT_VERSION: ${ADAPTIVE_KNOWLEDGE_OPENAI_PROMPT_VERSION:-}
      PIPELINE_ALLOWED_DOMAINS: ${PIPELINE_ALLOWED_DOMAINS:-}
      PIPELINE_FRESHNESS_WINDOW_DAYS: ${PIPELINE_FRESHNESS_WINDOW_DAYS:-}
      PIPELINE_BACKFILL_MAX_DAYS: ${PIPELINE_BACKFILL_MAX_DAYS:-}
      PIPELINE_MAX_RETRIES: ${PIPELINE_MAX_RETRIES:-}
      PIPELINE_REQUEST_TIMEOUT_MS: ${PIPELINE_REQUEST_TIMEOUT_MS:-}
      PIPELINE_MAX_QUERIES_PER_RUN: ${PIPELINE_MAX_QUERIES_PER_RUN:-}
    entrypoint: ["pnpm", "tsx", "scripts/adaptive-knowledge/refresh-corpus.ts"]
    command: ["--worker"]
    volumes:
      - adaptive_knowledge_data:/app/.planning/knowledge/adaptive-coaching

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coach}
      POSTGRES_USER: ${POSTGRES_USER:-coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coach} -d ${POSTGRES_DB:-coach}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  caddy:
    profiles:
      - caddy
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  adaptive_knowledge_data:

networks:
  backend:
